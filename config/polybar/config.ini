include-file = ~/.local/share/dwm/themes/current/polybar.ini

[bar/main]
monitor = ${env:MONITOR:}

height = 35

padding-top = 10
padding-bottom = 10
padding-left = 2
padding-right = 2
module-margin = 1

background = ${colors.background}
foreground = ${colors.foreground}

font-0 = JetBrainsMono Nerd Font:size=14;2

modules-left = dwm dwm-tags
modules-center = clock update screenrecording idle dnd
modules-right = tray bluetooth network pulseaudio brightness cpu lock battery

cursor-click = pointer
cursor-scroll = ns-resize

; --- left ---

[module/dwm]
type = custom/text
content = ’Ź¢
click-left = dwm-launch-menu
click-right = dwm-launch-menu drun

[module/dwm-tags]
type = custom/script
exec = ~/.local/share/dwm/scripts/polybar/dwm-tags.sh
tail = true

; --- center ---

[module/clock]
type = internal/date
interval = 1
time = "%I:%M %p"
label = %{A3:dwm-launch-terminal:}%time%%{A}

[module/update]
type = custom/script
exec = ~/.local/share/dwm/scripts/polybar/indicators/updates.sh
interval = 21600
click-left = dwm-launch-update

[module/screenrecording]
type = custom/script
exec = ~/.local/share/dwm/scripts/polybar/indicators/screen-recording.sh
tail = true
click-left = dwm-cmd-screenrecord start

[module/idle]
type = custom/script
exec = ~/.local/share/dwm/scripts/polybar/indicators/idle.sh
tail = true
click-left = dwm-toggle-idle

[module/dnd]
type = custom/script
exec = ~/.local/share/dwm/scripts/polybar/indicators/notification-silencing.sh
tail = true
click-left = dwm-launch-notifications

; --- right ---

[module/tray]
type = internal/tray
tray-spacing = 6px
tray-size = 55%

[module/bluetooth]
type = custom/script
exec = ~/.local/share/dwm/scripts/polybar/indicators/bluetooth.sh
tail = true
click-left = dwm-launch-bluetooth

[module/network]
type = internal/network
interface-type = wireless
interval = 3
format-connected = %{A1:dwm-launch-wifi:}<ramp-signal>%{A}
format-disconnected = %{A1:dwm-launch-wifi:}<label-disconnected>%{A}
label-disconnected = ¾░ż«
ramp-signal-0 = ¾░ż»
ramp-signal-1 = ¾░ż¤
ramp-signal-2 = ¾░żó
ramp-signal-3 = ¾░żź
ramp-signal-4 = ¾░ż©

[module/pulseaudio]
type = internal/pulseaudio
format-volume = %{A1:dwm-launch-audio:}%{A3:pamixer -t:}<ramp-volume>%{A}%{A}
format-muted = %{A1:dwm-launch-audio:}%{A3:pamixer -t:}<label-muted>%{A}%{A}
label-muted = Ņ╗©
ramp-volume-0 = ’Ć”
ramp-volume-1 = ’Ć¦
ramp-volume-2 = ’Ć©

[module/brightness]
type = internal/backlight
card = nvidia_wmi_ec_backlight

format = %{A1:brightnessctl set +5%:}%{A3:brightnessctl set 5%-:}<ramp>%{A}%{A}

ramp-0 = ¾░ā×
ramp-1 = ¾░ā¤
ramp-2 = ¾░āĀ

[module/cpu]
type = internal/cpu
format = %{A1:dwm-launch-btop:}<label>%{A}
label = ¾░Źø

[module/lock]
type = custom/script
exec = echo "¾░īŠ"
